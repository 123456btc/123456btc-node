version: '3.8'

services:
  bbt-node:
    build: .
    container_name: bbt-node
    restart: unless-stopped
    ports:
      - "1119:1119"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - BBT_LOG_LEVEL=info
      - BBT_NODE_PORT=1119
      - BBT_PROVIDER_SECRET=${PROVIDER_SECRET}
      - BBT_ADMIN_API_KEY=${ADMIN_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1119/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
