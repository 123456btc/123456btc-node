# ═══════════════════════════════════════════════════════════
# 123456btc-node Docker Compose — Production
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose up -d
#   docker compose logs -f
# ═══════════════════════════════════════════════════════════

services:
  # ── Main Node Service ──
  bbt-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbt-node
    restart: unless-stopped
    ports:
      - "${BBT_NODE_PORT:-1119}:1119"
    volumes:
      # Persistent data (SQLite database, etc.)
      - bbt-data:/app/data
      # Logs (optional, also goes to Docker stdout)
      - bbt-logs:/app/logs
    environment:
      - NODE_ENV=production
      - BBT_PROVIDER_ID=${BBT_PROVIDER_ID}
      - BBT_NODE_NAME=${BBT_NODE_NAME:-My 123456btc Node}
      - BBT_WALLET_ADDRESS=${BBT_WALLET_ADDRESS}
      - BBT_TREASURY_WALLET=${BBT_TREASURY_WALLET:-}
      - BBT_SOLANA_RPC=${BBT_SOLANA_RPC:-https://api.mainnet-beta.solana.com}
      - BBT_BBT_MINT=${BBT_BBT_MINT:-3s4AK2x2nGkKP8ZADbcKuhdPr3coSuh1XnwZEzWgpump}
      - BBT_NODE_PORT=1119
      - BBT_ADMIN_API_KEY=${BBT_ADMIN_API_KEY}
      - BBT_PROVIDER_SECRET=${BBT_PROVIDER_SECRET:-}
      - BBT_SETTLEMENT_MODE=${BBT_SETTLEMENT_MODE:-memo}
      - BBT_LOG_LEVEL=${BBT_LOG_LEVEL:-info}
      - BBT_SEEDS=${BBT_SEEDS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ENABLE_AUTO_EXECUTION=${ENABLE_AUTO_EXECUTION:-false}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1119/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - bbt-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

  # ── Nginx Reverse Proxy (optional, enable with: --profile proxy) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: bbt-nginx
    restart: unless-stopped
    profiles:
      - proxy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      bbt-node:
        condition: service_healthy
    networks:
      - bbt-net

volumes:
  bbt-data:
    driver: local
  bbt-logs:
    driver: local

networks:
  bbt-net:
    driver: bridge
